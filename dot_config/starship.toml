"$schema" = 'https://starship.rs/config-schema.json'

# ╭─ [ os ][ 󰉖 dir ][ branch  status ] ──────── [ node ][ ⏱ 3s ][ 12:34 ]
# ╰─ ❯
#
# Palette: Tokyo Night (#7aa2f7 blue · #9ece6a green · #bb9af7 purple · #e0af68 yellow)
# Font:    FiraCode Nerd Font Mono

format = """
[╭─](fg:#565f89)\
[](fg:#bb9af7)\
$os\
[](fg:#bb9af7 bg:#7aa2f7)\
$directory\
[](fg:#7aa2f7 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260)\
\n[╰─](fg:#565f89)$character"""

right_format = """$nodejs$python$rust$golang$kubernetes$cmd_duration$time"""

add_newline = false

# ── Left segments ────────────────────────────────────────────────────────────

[os]
disabled = false
style = "bg:#bb9af7 fg:#1a1b2e bold"
format = "[ $symbol ]($style)"

[os.symbols]
Ubuntu  = "󰕈"
Debian  = "󰣚"
Arch    = "󰣇"
Macos   = ""
Linux   = "󰌽"
Windows = "󰍲"

[directory]
style              = "bg:#7aa2f7 fg:#1a1b2e bold"
format             = "[ 󰉖 $path ]($style)"
truncation_length  = 3
truncate_to_repo   = true
read_only          = " 󰌾"
read_only_style    = "bg:#7aa2f7 fg:#f7768e"

[git_branch]
style  = "bg:#394260 fg:#9ece6a"
format = "[ $symbol$branch ]($style)"
symbol = " "

[git_status]
style      = "bg:#394260 fg:#e0af68"
format     = "[$all_status$ahead_behind]($style)"
conflicted = " 󰞇"
ahead      = " ⇡${count}"
behind     = " ⇣${count}"
diverged   = " ⇕"
up_to_date = ""
untracked  = " ?"
stashed    = " 󰏗"
modified   = " !"
staged     = " +"
renamed    = " »"
deleted    = " ✘"

# ── Right segments ───────────────────────────────────────────────────────────

[nodejs]
format       = "[ $symbol$version]($style) "
style        = "fg:#41c7c1"
symbol       = " "
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
format       = "[ $symbol$version( \\($virtualenv\\))]($style) "
style        = "fg:#f7c948"
symbol       = " "

[rust]
format = "[ $symbol$version]($style) "
style  = "fg:#f7768e"
symbol = " "

[golang]
format = "[ $symbol$version]($style) "
style  = "fg:#7dcfff"
symbol = " "

[kubernetes]
disabled = false
format   = "[ 󱃾 $context](fg:#bb9af7)[:$namespace](fg:#7dcfff) "
# Visibile solo quando kubectl è configurato (KUBECONFIG / ~/.kube/config)

[cmd_duration]
format            = "[  $duration]($style) "
style             = "fg:#565f89"
min_time          = 2000
show_milliseconds = false

[time]
disabled    = false
format      = "[ $time]($style)"
style       = "fg:#565f89"
time_format = "%H:%M"

# ── Prompt character ─────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold fg:#9ece6a)"
error_symbol   = "[❯](bold fg:#f7768e)"
vimcmd_symbol  = "[❮](bold fg:#bb9af7)"
